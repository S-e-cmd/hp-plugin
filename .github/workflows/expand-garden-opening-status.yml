name: Expand garden opening status plugin

on:
  push:
    paths:
      - '.staging/garden-opening-status-v3.0.18.4.zip.b64/**'
      - '.github/workflows/expand-garden-opening-status.yml'

permissions:
  contents: write

jobs:
  expand:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rebuild archive
        run: |
          cat .staging/garden-opening-status-v3.0.18.4.zip.b64/part-*.txt > /tmp/garden-opening-status.b64
          base64 -d /tmp/garden-opening-status.b64 > /tmp/garden-opening-status.zip
          unzip -t /tmp/garden-opening-status.zip

      - name: Expand plugin archive
        run: |
          rm -rf plugins/garden-opening-status
          mkdir -p plugins
          unzip -q /tmp/garden-opening-status.zip -d plugins
          test -f plugins/garden-opening-status/garden-opening-status.php

      - name: Commit expanded plugin
        run: |
          rm -rf .staging/garden-opening-status-v3.0.18.4.zip.b64
          rm -f .staging/garden-opening-status-v3.0.18.4.zip
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Add garden opening status 3.0.18.4"
          git push

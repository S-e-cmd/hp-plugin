name: Expand garden opening status plugin

on:
  push:
    paths:
      - '.staging/garden-opening-status-v3.0.18.4.zip'
      - '.github/workflows/expand-garden-opening-status.yml'

permissions:
  contents: write

jobs:
  expand:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check archive
        run: |
          ls -la .staging
          test -f .staging/garden-opening-status-v3.0.18.4.zip
          file .staging/garden-opening-status-v3.0.18.4.zip

      - name: Expand plugin archive
        run: |
          rm -rf plugins/garden-opening-status
          mkdir -p plugins
          base64 -d .staging/garden-opening-status-v3.0.18.4.zip > /tmp/garden-opening-status.zip
          unzip -t /tmp/garden-opening-status.zip
          unzip -q /tmp/garden-opening-status.zip -d plugins
          test -f plugins/garden-opening-status/garden-opening-status.php
          rm -f .staging/garden-opening-status-v3.0.18.4.zip

      - name: Commit expanded plugin
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Add garden opening status 3.0.18.4"
          git push

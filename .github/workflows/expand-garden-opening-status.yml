name: Expand garden opening status plugin

on:
  push:
    paths:
      - '.staging/garden-opening-status-v3.0.18.4.zip'

permissions:
  contents: write

jobs:
  expand:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Expand plugin archive
        run: |
          rm -rf plugins/garden-opening-status
          mkdir -p plugins
          unzip -q .staging/garden-opening-status-v3.0.18.4.zip -d plugins
          rm -f .staging/garden-opening-status-v3.0.18.4.zip
      - name: Commit expanded plugin
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugins/garden-opening-status .staging/garden-opening-status-v3.0.18.4.zip
          git commit -m "Add garden opening status 3.0.18.4" || exit 0
          git push

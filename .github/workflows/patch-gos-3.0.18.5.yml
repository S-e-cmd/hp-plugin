name: Build garden opening status 3.0.18.6

on:
  push:
    branches:
      - work/garden-opening-status-v3.0.18.5
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-and-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/garden-opening-status-v3.0.18.5
          fetch-depth: 0

      - name: Patch plugin
        run: |
          python3 - <<'PY'
          from pathlib import Path

          php = Path('plugins/garden-opening-status/garden-opening-status.php')
          css = Path('plugins/garden-opening-status/assets/admin.css')
          readme = Path('plugins/garden-opening-status/readme.txt')

          php_text = php.read_text(encoding='utf-8')
          for old in ('3.0.18.4', '3.0.18.5'):
              php_text = php_text.replace(f'Version: {old}', 'Version: 3.0.18.6')
              php_text = php_text.replace(f"const VERSION = '{old}';", "const VERSION = '3.0.18.6';")
          php.write_text(php_text, encoding='utf-8')

          css_text = css.read_text(encoding='utf-8')
          css_text = css_text.replace(
              '.gos3-preview-card{position:sticky;top:46px}',
              '.gos3-preview-card{position:sticky;top:46px;box-sizing:border-box;max-height:calc(100vh - 58px);overflow:auto}',
              1,
          )
          css_text = css_text.replace(
              '.gos3-preview-frame.desktop{width:100%;height:650px}',
              '.gos3-preview-frame.desktop{width:100%;height:clamp(360px,calc(100vh - 360px),650px)}',
              1,
          )
          css_text = css_text.replace(
              '.gos3-preview-frame.mobile{width:390px;max-width:100%;height:720px;border:8px solid #222;border-radius:24px}',
              '.gos3-preview-frame.mobile{width:390px;max-width:100%;height:clamp(460px,calc(100vh - 360px),720px);border:8px solid #222;border-radius:24px}',
              1,
          )
          css_text = css_text.replace(
              '@media(max-width:1180px){.gos3-grid{grid-template-columns:1fr}.gos3-preview-card{position:static}}',
              '@media(max-width:1180px){.gos3-grid{grid-template-columns:1fr}.gos3-preview-card{position:static;max-height:none;overflow:visible}}',
              1,
          )
          css.write_text(css_text, encoding='utf-8')

          if readme.exists():
              text = readme.read_text(encoding='utf-8')
              text = text.replace('3.0.18.5', '3.0.18.6').replace('3.0.18.4', '3.0.18.6')
              readme.write_text(text, encoding='utf-8')
          PY

      - name: Validate syntax
        run: |
          php -l plugins/garden-opening-status/garden-opening-status.php
          node --check plugins/garden-opening-status/assets/admin.js

      - name: Commit patched source
        run: |
          if git diff --quiet; then
            echo "No source changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add plugins/garden-opening-status
            git commit -m "Adjust preview height in 3.0.18.6"
            git push origin HEAD:work/garden-opening-status-v3.0.18.5
          fi

      - name: Build WordPress ZIP
        run: |
          rm -rf dist
          mkdir -p dist
          cd plugins
          zip -r ../dist/garden-opening-status-v3.0.18.6.zip garden-opening-status

      - uses: actions/upload-artifact@v4
        with:
          name: garden-opening-status-v3.0.18.6
          path: dist/garden-opening-status-v3.0.18.6.zip
          if-no-files-found: error
